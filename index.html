<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sportlink</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e8002d;
      --dark: #0a0a0f;
      --mid: #111118;
      --border: #1e1e2a;
      --text: #e0e0f0;
      --muted: #6a6a88;
      --glow: rgba(232, 0, 45, 0.35);
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    header {
      background: var(--mid);
      border-bottom: 2px solid var(--red);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 32px var(--glow);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--red);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      color: #fff;
      letter-spacing: 1px;
      box-shadow: 0 0 14px var(--glow);
    }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 4px;
      color: #fff;
      text-shadow: 0 0 20px var(--glow);
    }

    .logo-text span {
      color: var(--red);
    }

    nav {
      display: flex;
      gap: 1.6rem;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--red); }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(232,0,45,0.12);
      border: 1px solid var(--red);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--red);
    }

    .live-dot {
      width: 7px;
      height: 7px;
      background: var(--red);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* ── CHANNEL BAR ── */
    .channel-bar {
      background: linear-gradient(90deg, #13000a 0%, #0f0f1a 40%, #13000a 100%);
      border-bottom: 1px solid var(--border);
      padding: 10px 2rem;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .channel-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .channel-icon {
      width: 32px;
      height: 32px;
      background: var(--red);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .channel-icon svg {
      width: 16px;
      height: 16px;
      fill: white;
    }

    .channel-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.35rem;
      letter-spacing: 3px;
      color: #fff;
    }

    .channel-sub {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .divider {
      width: 1px;
      height: 28px;
      background: var(--border);
      margin: 0 4px;
    }

    .quality-badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      background: var(--red);
      color: white;
      padding: 3px 8px;
      border-radius: 3px;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      gap: 1.5rem;
    }

    .player-wrap {
      width: 100%;
      max-width: 1100px;
      position: relative;
    }

    .player-frame {
      width: 100%;
      aspect-ratio: 16/9;
      border: 2px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(232,0,45,0.15),
        0 8px 60px rgba(0,0,0,0.7),
        0 0 40px rgba(232,0,45,0.12);
      position: relative;
      background: #000;
    }

    .player-corner {
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--red);
      border-style: solid;
      z-index: 2;
    }
    .player-corner.tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; border-radius: 10px 0 0 0; }
    .player-corner.tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; border-radius: 0 10px 0 0; }
    .player-corner.bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; border-radius: 0 0 0 10px; }
    .player-corner.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; border-radius: 0 0 10px 0; }

    .player-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--mid);
      border-top: 2px solid var(--border);
      padding: 1.4rem 2rem;
      text-align: center;
    }

    .footer-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .footer-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 4px;
      color: var(--muted);
    }

    .footer-logo span { color: var(--red); }

    .footer-copy {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .footer-copy strong {
      color: var(--text);
      font-weight: 700;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav { display: none; }
      header { padding: 0 1rem; }
      .channel-bar { padding: 8px 1rem; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">SL</div>
      <div class="logo-text">Sport<span>link</span></div>
    </div>
    <nav>
      <a href="#">Live</a>
      <a href="#">Sports</a>
      <a href="#">Schedule</a>
    </nav>
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
  </header>

  <!-- CHANNEL BAR -->
  <div class="channel-bar">
    <div class="channel-label">
      <div class="channel-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      </div>
      <div>
        <div class="channel-name">Star Sports 1 HD</div>
        <div class="channel-sub">ENG · Live Broadcast</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="quality-badge">HD</div>
  </div>

  <!-- MAIN PLAYER -->
  <main>
    <div class="player-wrap">
      <div class="player-frame">
        <div class="player-corner tl"></div>
        <div class="player-corner tr"></div>
        <div class="player-corner bl"></div>
        <div class="player-corner br"></div>
        <iframe
          src="https://sportlink-eng.vercel.app/"
          allowfullscreen
          allow="autoplay; encrypted-media; fullscreen"
          scrolling="no"
          title="Star Sports 1 HD - ENG"
        ></iframe>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-logo">Sport<span>link</span></div>
      <div class="footer-copy">
        Sportlink &copy; 2026 &mdash; All rights reserved by <strong>Sayan</strong>
      </div>
    </div>
  </footer>

</body>
</html>
